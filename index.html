<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio Scheduler</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
    }

    .navbar {
      display: flex;
      background: #1f2937;
      padding: 1rem;
      gap: 1rem;
    }

    .nav-btn {
      background: #2563eb;
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
    }

    .nav-btn:hover {
      background: #1d4ed8;
    }

    .page {
      display: none;
      padding: 2rem;
    }

    .active {
      display: block;
    }

    .clock {
      font-size: 4rem;
      color: #60a5fa;
      margin-bottom: 1rem;
    }

    .status {
      margin-top: 1rem;
      color: #9ca3af;
      min-height: 24px;
    }

    .button-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 2rem;
    }

    .audio-btn {
      padding: 14px;
      border: none;
      border-radius: 8px;
      background: #2563eb;
      color: white;
      cursor: pointer;
      font-size: 1rem;
    }

    .audio-btn:hover {
      background: #1d4ed8;
    }

    .config-card {
      background: #1f2937;
      padding: 1.5rem;
      border-radius: 12px;
      margin-bottom: 1rem;
    }

    label {
      display: block;
      margin-top: 1rem;
      margin-bottom: 0.5rem;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: none;
      font-size: 1rem;
    }

    .save-btn {
      margin-top: 1rem;
      background: #16a34a;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      color: white;
      cursor: pointer;
    }

    .save-btn:hover {
      background: #15803d;
    }

    .schedule-list {
      margin-top: 2rem;
    }

    .schedule-item {
      background: #374151;
      padding: 1rem;
      border-radius: 8px;
      margin-bottom: 10px;
    }

  </style>
</head>
<body>

  <!-- NAVIGATION -->
  <div class="navbar">
    <button class="nav-btn" onclick="showPage('homePage')">
      Home
    </button>

    <button class="nav-btn" onclick="showPage('configPage'), renderSchedules()">
      Config
    </button>
  </div>

  <!-- HOME PAGE -->
  <div id="homePage" class="page active">

    <h1>Audio Scheduler</h1>

    <div class="clock" id="clock">
      00:00:00
    </div>

    <div class="status" id="status">
      Waiting for scheduled playback...
    </div>

    <h2>Manual Audio Triggers</h2>

    <div class="button-grid" id="buttonGrid"></div>
    <button
  class="audio-btn"
  onclick="stopAudio()"
  style="
    background:#dc2626;
    margin-top:20px;
    width:100%;
  "
>
  STOP AUDIO
</button>
  </div>

  <!-- CONFIG PAGE -->
  <div id="configPage" class="page">

    <h1>Schedule Configuration</h1>

    <div class="config-card">

      <label>Time</label>
      <input type="time" id="scheduleTime" />

      <label>Select Audio</label>
      <select id="audioSelect"></select>

      <button class="save-btn" onclick="saveSchedule()">
        Save Schedule
      </button>

    </div>

    <div class="schedule-list" id="scheduleList"></div>

  </div>

  <script>

    // ==================================================
    // AUDIO FILES
    // ==================================================

    const audioFiles = [
  {
    name: "Bell 1",
    url: "sounds/bell1.mp3"
  },
  {
    name: "Bell 2",
    url: "sounds/bell2.mp3"
  },
  {
    name: "Bell 3",
    url: "sounds/bell3.mp3"
  },
  {
    name: "Bell 4",
    url: "sounds/bell4.mp3"
  },
  {
    name: "Bell 5",
    url: "sounds/bell5.mp3"
  },
  {
    name: "Bell 6",
    url: "sounds/bell6.mp3"
  },
  {
    name: "Bell 7",
    url: "sounds/bell7.mp3"
  },
  {
    name: "Bell 8",
    url: "sounds/bell8.mp3"
  },
  {
    name: "Bell 9",
    url: "sounds/bell9.mp3"
  },
  {
    name: "Bell 10",
    url: "sounds/bell10.mp3"
  },
  {
    name: "Bell 11",
    url: "sounds/bell11.mp3"
  },
  {
    name: "Bell 12",
    url: "sounds/bell12.mp3"
  }
];

    // ==================================================
    // STATE
    // ==================================================

    let schedules = [{
    time: "08:00",
    audio: audioFiles[0], // Bell 1
    played: false
  },
  {
    time: "09:00",
    audio: audioFiles[1], // Bell 2
    played: false
  },
  {
    time: "10:30",
    audio: audioFiles[2], // Bell 3
    played: false
  },
  {
    time: "12:00",
    audio: audioFiles[3], // Bell 4
    played: false
  },
  {
    time: "13:00",
    audio: audioFiles[4], // Bell 5
    played: false
  },
  {
    time: "15:00",
    audio: audioFiles[5], // Bell 6
    played: false
  }
];

    // ==================================================
    // PAGE NAVIGATION
    // ==================================================

    function showPage(pageId) {

      document.querySelectorAll(".page").forEach(page => {
        page.classList.remove("active");
      });

      document.getElementById(pageId).classList.add("active");
    }

    // ==================================================
    // CLOCK
    // ==================================================

    const clockEl = document.getElementById("clock");
    const statusEl = document.getElementById("status");

    function updateClock() {

      const now = new Date();

      const hours = String(now.getHours()).padStart(2, "0");
      const minutes = String(now.getMinutes()).padStart(2, "0");
      const seconds = String(now.getSeconds()).padStart(2, "0");

      const currentTime = `${hours}:${minutes}`;
      const displayTime = `${hours}:${minutes}:${seconds}`;

      clockEl.textContent = displayTime;

      checkSchedules(currentTime);
    }

    setInterval(updateClock, 1000);

    updateClock();

    // ==================================================
    // MANUAL BUTTONS
    // ==================================================

    const buttonGrid = document.getElementById("buttonGrid");

    audioFiles.forEach(audioData => {

      const button = document.createElement("button");

      button.className = "audio-btn";

      button.textContent = audioData.name;

      button.addEventListener("click", () => {
        playAudio(audioData.url, audioData.name);
      });

      buttonGrid.appendChild(button);
    });

    // ==================================================
    // AUDIO SELECT
    // ==================================================

    const audioSelect = document.getElementById("audioSelect");

    audioFiles.forEach((audio, index) => {

      const option = document.createElement("option");

      option.value = index;

      option.textContent = audio.name;

      audioSelect.appendChild(option);
    });


  // ==================================================
  // GLOBAL AUDIO STATE
  // ==================================================

  let currentAudio = null;
  let currentAudioLabel = null;

  // ==================================================
  // STOP AUDIO FUNCTION
  // ==================================================

  function stopAudio() {

    if (currentAudio) {

      currentAudio.pause();

      currentAudio.currentTime = 0;

      currentAudio = null;

      currentAudioLabel = null;

      statusEl.textContent = "Audio stopped";
    }
  }

  // ==================================================
  // PLAY AUDIO
  // ==================================================

  async function playAudio(url, label) {

    try {

      // ------------------------------------------
      // PREVENT DUPLICATE SAME AUDIO
      // ------------------------------------------

      if (
        currentAudio &&
        currentAudioLabel === label &&
        !currentAudio.paused
      ) {
        return;
      }

      // ------------------------------------------
      // STOP CURRENT AUDIO
      // ------------------------------------------
      
      stopAudio();
      
      // ------------------------------------------
      // CREATE NEW AUDIO
      // ------------------------------------------

      currentAudio = new Audio(url);

      currentAudioLabel = label;

      currentAudio.preload = "auto";

      // ------------------------------------------
      // PLAY
      // ------------------------------------------

      await currentAudio.play();

      statusEl.textContent = `Playing: ${label}`;

      // ------------------------------------------
      // CLEANUP WHEN FINISHED
      // ------------------------------------------

      currentAudio.onended = () => {

        currentAudio = null;

        currentAudioLabel = null;

        statusEl.textContent =
          "Playback finished";
      };

    } catch (err) {

      console.error(err);

      statusEl.textContent =
        `Failed to play: ${label}`;

      currentAudio = null;

      currentAudioLabel = null;
    }
  }

    // ==================================================
    // SAVE SCHEDULE
    // ==================================================

    function saveSchedule() {

      const time = document.getElementById("scheduleTime").value;

      const audioIndex = document.getElementById("audioSelect").value;

      if (!time) {
        alert("Please select a time");
        return;
      }

      const selectedAudio = audioFiles[audioIndex];

      schedules.push({
        time: time,
        audio: selectedAudio,
        played: false
      });

      renderSchedules();
    }

    // ==================================================
    // RENDER SCHEDULES
    // ==================================================

    function renderSchedules() {

      const scheduleList = document.getElementById("scheduleList");

      scheduleList.innerHTML = "";

      schedules.forEach((schedule, index) => {

        const div = document.createElement("div");

        div.className = "schedule-item";

        div.innerHTML = `
          <strong>${schedule.time}</strong>
          <br>
          ${schedule.audio.name}
        `;

        scheduleList.appendChild(div);
      });
    }

    // ==================================================
    // CHECK SCHEDULES
    // ==================================================

    function checkSchedules(currentTime) {

      schedules.forEach(schedule => {

        // Reset played state after minute changes
        if (currentTime !== schedule.time) {
          schedule.played = false;
        }

        // Trigger audio
        if (currentTime === schedule.time && !schedule.played) {

          playAudio(
            schedule.audio.url,
            schedule.audio.name
          );

          schedule.played = true;
        }
      });
    }

  </script>

</body>
</html>
